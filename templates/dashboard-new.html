<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCM Migration · backup import</title>
    <!-- Tailwind (sharp reset) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* force zero rounding everywhere, simple blocky aesthetics */
      * {
        border-radius: 0 !important;
      }
      /* subtle transition for opacity & background (fast UX feedback) */
      button,
      select,
      input[type="file"] {
        transition:
          opacity 0.1s ease,
          background-color 0.1s ease,
          border-color 0.1s ease;
      }
      button:active {
        opacity: 0.75;
      }
      /* custom spinner – pure css, no rounding */
      .sharp-spinner {
        display: inline-block;
        width: 1rem;
        height: 1rem;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top: 2px solid white;
        animation: spin 0.7s linear infinite;
        margin-right: 6px;
        vertical-align: middle;
        box-sizing: border-box;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      /* hidden utility with fast fade (no slide) */
      .fade-hidden {
        opacity: 0;
        visibility: hidden;
        transition:
          opacity 0.12s ease,
          visibility 0s 0.12s;
      }
      .fade-visible {
        opacity: 1;
        visibility: visible;
        transition:
          opacity 0.12s ease,
          visibility 0s 0s;
      }
      /* file input cosmetics – sharp, no background */
      .file-input-clear {
        border: 1px solid #000;
        background: #fff;
        padding: 0.5rem;
        font-size: 0.75rem;
        width: 100%;
      }
      .file-input-clear::file-selector-button {
        border: 1px solid #000;
        background: #fff;
        padding: 0.25rem 0.5rem;
        margin-right: 0.75rem;
        font-size: 0.7rem;
        box-shadow: none;
        transition: background 0.1s;
        border-radius: 0;
      }
      .file-input-clear::file-selector-button:active {
        background: #e5e5e5;
      }
      /* select / button sharp style */
      .sharp-select {
        border: 1px solid #000;
        background: #fff;
        padding: 0.5rem;
        font-size: 0.75rem;
        width: 100%;
        appearance: none;
        /* simple arrow (no fancy) */
        background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="square" stroke-linejoin="square"><polyline points="6 9 12 15 18 9"/></svg>');
        background-repeat: no-repeat;
        background-position: right 0.5rem center;
        background-size: 1rem;
      }
      .sharp-btn {
        border: 1px solid #000;
        background: #fff;
        padding: 0.5rem;
        font-size: 0.75rem;
        width: 100%;
        font-weight: normal;
        cursor: default; /* will be overridden but consistent */
        transition:
          background 0.1s,
          border 0.1s;
        text-align: center;
      }
      .sharp-btn.primary {
        background: #000;
        color: #fff;
        border: 1px solid #000;
      }
      .sharp-btn.primary:active {
        background: #333;
      }
      .sharp-btn:active {
        background: #f0f0f0;
      }
      .disabled-like {
        opacity: 0.5;
        pointer-events: none;
        border-color: #aaa;
      }
      /* minimal card */
      .sharp-card {
        background: white;
        border: 1px solid #000;
        box-shadow: 4px 4px 0 #000;
        padding: 1rem;
      }
      body {
        background: #f3f3f3;
      }
      hr {
        border: 0.5px solid #000;
        margin: 0.5rem 0;
      }
    </style>
  </head>
  <body
    class="flex h-screen justify-center items-center bg-[#ececec] font-sans antialiased"
  >
    <div class="sharp-card w-full max-w-xs text-xs flex flex-col gap-3">
      <div class="flex justify-between items-center">
        <h1 class="text-base font-bold uppercase tracking-wide">
          Backup import
        </h1>
        <span class="text-[9px] border border-black px-1 py-0.5 bg-white"
          >SCM</span
        >
      </div>
      <hr />

      <!-- FILE INPUT AREA (always visible, sharp) -->
      <div>
        <label class="block mb-1 font-medium text-[0.7rem] uppercase"
          >1. choose backup</label
        >
        <input
          type="file"
          id="backupFile"
          accept=".xml"
          class="file-input-clear"
        />
      </div>

      <!-- DEVICE DROPDOWN + loading indicator inline (simple) -->
      <div>
        <div class="flex items-center gap-2 mb-1">
          <label class="block font-medium text-[0.7rem] uppercase"
            >2. target device</label
          >
          <div
            id="deviceLoader"
            class="fade-hidden inline-flex items-center gap-1 text-[0.6rem]"
          >
            <span
              class="sharp-spinner border-black border-t-black/30"
              style="border-color: #555; border-top-color: #111"
            ></span>
            <span>loading</span>
          </div>
        </div>
        <select id="deviceSelect" class="sharp-select fade-hidden">
          <option value="">— select device —</option>
        </select>
        <!-- tiny hint (optional) -->
        <p id="deviceHint" class="text-[0.6rem] mt-1 text-gray-600 fade-hidden">
           
        </p>
      </div>

      <!-- IMPORT BUTTON (sharp + loading state) -->
      <button
        id="importBtn"
        class="sharp-btn primary fade-hidden relative flex justify-center items-center gap-2"
      >
        <span id="importBtnText">Import backup</span>
        <span id="importSpinner" class="sharp-spinner fade-hidden"></span>
      </button>

      <!-- subtle status line (no alerts) -->
      <div
        id="statusMsg"
        class="text-[0.65rem] border-t border-black pt-1 mt-1 min-h-[1.5rem]"
      >
        ​<!-- blank using zero-width space -->​
      </div>

      <div class="flex items-center justify-centerw-full gap-2 mt-4">
        <p class="text-[0.6rem] text-gray-600">
          Made with passion by
          <span class="font-medium text-black"
            ><a href="https://github.com/PaluskarAditya" target="_blank"
              >@aid3n</a
            ></span
          >
        </p>
        <img src="/images/pfp.png" class="h-[30px] w-[30px]" />
      </div>
    </div>

    <script type="module">
      // === DOM refs ===
      const fileInput = document.getElementById("backupFile");
      const deviceSelect = document.getElementById("deviceSelect");
      const importBtn = document.getElementById("importBtn");
      const deviceLoader = document.getElementById("deviceLoader");
      const deviceHint = document.getElementById("deviceHint");
      const importSpinner = document.getElementById("importSpinner");
      const importBtnText = document.getElementById("importBtnText");
      const statusDiv = document.getElementById("statusMsg");

      // === state ===
      let devicesCache = [];
      let isLoadingDevices = false;
      let isImporting = false;

      // helper: update UI visibility/classes (pure fade)
      function setComponentVisibility() {
        // device select visibility: only if devices exist and not loading
        const hasDevices = devicesCache.length > 0;
        if (hasDevices && !isLoadingDevices) {
          deviceSelect.classList.remove("fade-hidden");
          deviceSelect.classList.add("fade-visible");
          deviceHint.innerText = `${devicesCache.length} device(s) · click to select`;
          deviceHint.classList.remove("fade-hidden");
          deviceHint.classList.add("fade-visible");
        } else {
          deviceSelect.classList.remove("fade-visible");
          deviceSelect.classList.add("fade-hidden");
          if (!isLoadingDevices) {
            deviceHint.innerText = "no devices available";
            deviceHint.classList.remove("fade-hidden");
            deviceHint.classList.add("fade-visible");
          } else {
            deviceHint.classList.remove("fade-visible");
            deviceHint.classList.add("fade-hidden");
          }
        }

        // loader visibility
        if (isLoadingDevices) {
          deviceLoader.classList.remove("fade-hidden");
          deviceLoader.classList.add("fade-visible");
        } else {
          deviceLoader.classList.remove("fade-visible");
          deviceLoader.classList.add("fade-hidden");
        }

        // import button visibility: only if device selected AND not importing
        const deviceSelected = deviceSelect.value && deviceSelect.value !== "";
        if (deviceSelected && !isImporting) {
          importBtn.classList.remove("fade-hidden");
          importBtn.classList.add("fade-visible");
        } else {
          importBtn.classList.remove("fade-visible");
          importBtn.classList.add("fade-hidden");
        }

        // import button loading indicator
        if (isImporting) {
          importSpinner.classList.remove("fade-hidden");
          importSpinner.classList.add("fade-visible");
          importBtnText.innerText = "Importing";
          importBtn.style.pointerEvents = "none";
          importBtn.style.opacity = "0.7";
        } else {
          importSpinner.classList.remove("fade-visible");
          importSpinner.classList.add("fade-hidden");
          importBtnText.innerText = "Import backup";
          importBtn.style.pointerEvents = "";
          importBtn.style.opacity = "";
        }

        // file input disabled look during import (disable visually)
        if (isImporting) {
          fileInput.setAttribute("disabled", "disabled");
          fileInput.classList.add("disabled-like");
        } else {
          fileInput.removeAttribute("disabled");
          fileInput.classList.remove("disabled-like");
        }
      }

      // show status (vanilla, no alert)
      function setStatus(msg, isError = false) {
        statusDiv.innerText = msg;
        statusDiv.style.color = isError ? "#a00" : "#000";
      }

      // clear status after a few sec (optional)
      function clearStatusAfter(delay = 3000) {
        setTimeout(() => {
          if (statusDiv.innerText !== "") statusDiv.innerText = "";
        }, delay);
      }

      // === step 1: file change → fetch devices (with loader) ===
      fileInput.addEventListener("change", async () => {
        if (fileInput.files.length === 0) {
          // no file: reset device list?
          devicesCache = [];
          deviceSelect.innerHTML =
            '<option value="">— select device —</option>';
          setComponentVisibility();
          setStatus("");
          return;
        }

        // show immediate feedback
        setStatus(`File: ${fileInput.files[0].name}`);
        isLoadingDevices = true;
        setComponentVisibility();

        try {
          const response = await fetch("/api/v1/get-devices", {
            method: "GET",
            credentials: "include",
          });

          const data = await response.json();

          if (!data || data.length === 0) {
            devicesCache = [];
            deviceSelect.innerHTML =
              '<option value="">— none available —</option>';
            setStatus("No devices found", true);
          } else {
            devicesCache = data;
            // populate dropdown
            deviceSelect.innerHTML =
              '<option value="">— select device —</option>';
            data.forEach((device) => {
              const option = document.createElement("option");
              option.value = device.serial_number;
              option.textContent = `${device.display_name || "?"} (${device.serial_number})`;
              deviceSelect.appendChild(option);
            });
            setStatus(`Loaded ${data.length} device(s)`);
            clearStatusAfter(2000);
          }
        } catch (err) {
          console.error(err);
          devicesCache = [];
          deviceSelect.innerHTML = '<option value="">— error —</option>';
          setStatus("Failed to fetch devices", true);
          clearStatusAfter(2500);
        } finally {
          isLoadingDevices = false;
          setComponentVisibility();

          // if after load a device was previously selected (rare), but we keep it simple
          if (deviceSelect.value) {
            // already selected, show import if possible
          }
        }
      });

      // === step 2: device select → update import button visibility (already in setComponentVisibility) ===
      deviceSelect.addEventListener("change", () => {
        setComponentVisibility();
        if (deviceSelect.value) {
          setStatus(`Target: ${deviceSelect.value}`);
          clearStatusAfter(1800);
        } else {
          setStatus("");
        }
      });

      // === step 3: import backup with loading / animation ===
      importBtn.addEventListener("click", async () => {
        const file = fileInput.files[0];
        const selectedDevice = deviceSelect.value;

        if (!file || !selectedDevice) {
          setStatus("Missing file or device", true);
          clearStatusAfter(2000);
          return;
        }

        // start import UI
        isImporting = true;
        setComponentVisibility();
        setStatus("Starting import...");

        const formData = new FormData();
        formData.append("backup", file);
        formData.append("serial", selectedDevice);

        try {
          const response = await fetch("/api/v1/import-backup", {
            method: "POST",
            body: formData,
            credentials: "include",
          });

          const result = await response.json();

          if (result.success) {
            setStatus("✅ Migration started");
            // optional: reset file input? but we keep it for clarity
            // disable file & select to avoid re-run? we keep disabled during import already.
            // after success we could re-enable but keep it simple: stay in importing state for 1s then reset
            setTimeout(() => {
              isImporting = false;
              setComponentVisibility();
              setStatus("Ready");
              clearStatusAfter(1500);
            }, 800);
          } else {
            setStatus("❌ Import failed", true);
            isImporting = false;
            setComponentVisibility();
            clearStatusAfter(2500);
          }
        } catch (err) {
          console.error(err);
          setStatus("Error during import", true);
          isImporting = false;
          setComponentVisibility();
          clearStatusAfter(2500);
        }
      });

      // initial call: set correct hidden states (device select hidden, loader hidden)
      setComponentVisibility();

      // additional: when file input changes due to cancel, we need to possibly reset
      fileInput.addEventListener("click", () => {
        // if user cancels file selection, fileInput.files will be empty; but "change" handles that.
      });

      // tiny improvement: if user picks same file again, still fetch devices
      // also reset import button when file changes
      const originalFileHandler = fileInput.addEventListener(
        "change",
        async () => {},
      ); // already defined
      // but we need to ensure import button hides when file changes without devices:
      // already inside setComponentVisibility.

      // add small UX: if devices already loaded and file present, show import only after device selected.
      // ensure if file deleted, hide select & import
      document.addEventListener("DOMContentLoaded", () => {
        setComponentVisibility();
      });
    </script>
  </body>
</html>
